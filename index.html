<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Påskekrim for utviklere 🐣</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 50px auto;
            line-height: 1.6;
        }
        input, button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🐣 Påskekrim: Den forsvunne deployen</h1>

    <p>
        Produksjon er nede. Noe gikk galt i siste deploy.
    </p>

    <p>
        Klarer du finne feilene i koden?
    </p>

    <p>
        👉 <a href="https://github.com/sarahsvabo/">Se caset her</a>
    </p>

    <h3>Hva er feilene?</h3>

    <input id="answer" placeholder="Skriv kort hva som er galt..." />
    <button onclick="checkAnswer()">Sjekk svar</button>

    <div id="result"></div>

    <script>
        function checkAnswer() {
            const input = document.getElementById("answer").value.toLowerCase();

            if (
                input.includes("role") &&
                input.includes("=") &&
                input.includes("environment") &&
                input.includes("strategy")
            ) {
                document.getElementById("result").innerHTML =
                    "🎉 Riktig! Du fant det.<br><br>" +
                    "<a href='https://DERES-SØKNADSSKJEMA.no'>🔓 Gå videre til neste steg</a>";
            } else {
                document.getElementById("result").innerText =
                    "Hmm... ikke helt der ennå. Prøv igjen 🐣";
            }
        }
    </script>

</body>
</html>
